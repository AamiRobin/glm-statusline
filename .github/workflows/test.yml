name: Test Statusline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [14.x, 16.x, 18.x, 20.x]

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}

    - name: Test statusline script
      run: |
        echo '{"context_window":{"used_percentage":45},"workspace":{"current_dir":"/test/project"}}' | node statusline-command.js

    - name: Verify script syntax
      run: |
        node -c statusline-command.js
        node -c install.js
